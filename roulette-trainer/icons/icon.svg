<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- app background -->
  <rect width="512" height="512" rx="80" fill="#1a1a1a"/>

  <!-- outer rim -->
  <circle cx="256" cy="256" r="232" fill="#8B6914"/>
  <circle cx="256" cy="256" r="220" fill="#c9960a"/>
  <circle cx="256" cy="256" r="210" fill="#1a1a1a"/>

  <!-- 36 alternating red/black pockets (18 each) + zero -->
  <!-- Generated as pie wedges: each pocket = 360/37 ≈ 9.73°
       Wheel order: 0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26
       Red numbers: 1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36 -->

  <!-- Pocket wedges using path arc commands. Center 256,256 r=210 -->
  <!-- Each wedge: start angle i*(360/37), span 360/37 degrees -->
  <!-- Colors: 0=green, then follow wheel sequence for red/black -->

  <!-- We'll use a simpler visual: concentric ring of alternating colored arcs -->
  <!-- Using 37 wedges drawn as path elements -->

  <!-- Outer pocket ring r=210 to r=150 -->
  <!-- pocket 0: green, angle 0 to 9.73° -->
  <path d="M256,256 L256,46 A210,210 0 0,1 289.5,49.3 Z" fill="#07884a"/>
  <!-- pocket 1 (32-red): -->
  <path d="M256,256 L289.5,49.3 A210,210 0 0,1 322.4,59.1 Z" fill="#c0392b"/>
  <!-- pocket 2 (15-black): -->
  <path d="M256,256 L322.4,59.1 A210,210 0 0,1 353.7,75.3 Z" fill="#1a1a1a"/>
  <!-- pocket 3 (19-red): -->
  <path d="M256,256 L353.7,75.3 A210,210 0 0,1 382.5,97.6 Z" fill="#c0392b"/>
  <!-- pocket 4 (4-black): -->
  <path d="M256,256 L382.5,97.6 A210,210 0 0,1 407.8,125.4 Z" fill="#1a1a1a"/>
  <!-- pocket 5 (21-red): -->
  <path d="M256,256 L407.8,125.4 A210,210 0 0,1 428.9,157.8 Z" fill="#c0392b"/>
  <!-- pocket 6 (2-black): -->
  <path d="M256,256 L428.9,157.8 A210,210 0 0,1 444.8,193.6 Z" fill="#1a1a1a"/>
  <!-- pocket 7 (25-red): -->
  <path d="M256,256 L444.8,193.6 A210,210 0 0,1 454.9,231.5 Z" fill="#c0392b"/>
  <!-- pocket 8 (17-black): -->
  <path d="M256,256 L454.9,231.5 A210,210 0 0,1 458.9,270.4 Z" fill="#1a1a1a"/>
  <!-- pocket 9 (34-red): -->
  <path d="M256,256 L458.9,270.4 A210,210 0 0,1 456.6,309.3 Z" fill="#c0392b"/>
  <!-- pocket 10 (6-black): -->
  <path d="M256,256 L456.6,309.3 A210,210 0 0,1 448.1,347.0 Z" fill="#1a1a1a"/>
  <!-- pocket 11 (27-red): -->
  <path d="M256,256 L448.1,347.0 A210,210 0 0,1 433.7,382.5 Z" fill="#c0392b"/>
  <!-- pocket 12 (13-black): -->
  <path d="M256,256 L433.7,382.5 A210,210 0 0,1 413.8,414.5 Z" fill="#1a1a1a"/>
  <!-- pocket 13 (36-red): -->
  <path d="M256,256 L413.8,414.5 A210,210 0 0,1 389.1,442.3 Z" fill="#c0392b"/>
  <!-- pocket 14 (11-black): -->
  <path d="M256,256 L389.1,442.3 A210,210 0 0,1 360.4,465.0 Z" fill="#1a1a1a"/>
  <!-- pocket 15 (30-red): -->
  <path d="M256,256 L360.4,465.0 A210,210 0 0,1 328.5,482.0 Z" fill="#c0392b"/>
  <!-- pocket 16 (8-black): -->
  <path d="M256,256 L328.5,482.0 A210,210 0 0,1 294.3,492.9 Z" fill="#1a1a1a"/>
  <!-- pocket 17 (23-red): -->
  <path d="M256,256 L294.3,492.9 A210,210 0 0,1 258.9,497.3 Z" fill="#c0392b"/>
  <!-- pocket 18 (10-black): -->
  <path d="M256,256 L258.9,497.3 A210,210 0 0,1 223.5,495.3 Z" fill="#1a1a1a"/>
  <!-- pocket 19 (5-red): -->
  <path d="M256,256 L223.5,495.3 A210,210 0 0,1 189.0,487.0 Z" fill="#c0392b"/>
  <!-- pocket 20 (24-black): -->
  <path d="M256,256 L189.0,487.0 A210,210 0 0,1 156.2,472.7 Z" fill="#1a1a1a"/>
  <!-- pocket 21 (16-red): -->
  <path d="M256,256 L156.2,472.7 A210,210 0 0,1 125.9,452.9 Z" fill="#c0392b"/>
  <!-- pocket 22 (33-black): -->
  <path d="M256,256 L125.9,452.9 A210,210 0 0,1 98.8,428.3 Z" fill="#1a1a1a"/>
  <!-- pocket 23 (1-red): -->
  <path d="M256,256 L98.8,428.3 A210,210 0 0,1 75.6,399.7 Z" fill="#c0392b"/>
  <!-- pocket 24 (20-black): -->
  <path d="M256,256 L75.6,399.7 A210,210 0 0,1 56.7,367.9 Z" fill="#1a1a1a"/>
  <!-- pocket 25 (14-red): -->
  <path d="M256,256 L56.7,367.9 A210,210 0 0,1 42.6,333.7 Z" fill="#c0392b"/>
  <!-- pocket 26 (31-black): -->
  <path d="M256,256 L42.6,333.7 A210,210 0 0,1 33.5,297.8 Z" fill="#1a1a1a"/>
  <!-- pocket 27 (9-red): -->
  <path d="M256,256 L33.5,297.8 A210,210 0 0,1 29.5,260.9 Z" fill="#c0392b"/>
  <!-- pocket 28 (22-black): -->
  <path d="M256,256 L29.5,260.9 A210,210 0 0,1 30.7,224.0 Z" fill="#1a1a1a"/>
  <!-- pocket 29 (18-red): -->
  <path d="M256,256 L30.7,224.0 A210,210 0 0,1 36.9,187.8 Z" fill="#c0392b"/>
  <!-- pocket 30 (29-black): -->
  <path d="M256,256 L36.9,187.8 A210,210 0 0,1 48.1,153.3 Z" fill="#1a1a1a"/>
  <!-- pocket 31 (7-red): -->
  <path d="M256,256 L48.1,153.3 A210,210 0 0,1 63.9,121.0 Z" fill="#c0392b"/>
  <!-- pocket 32 (28-black): -->
  <path d="M256,256 L63.9,121.0 A210,210 0 0,1 84.0,91.5 Z" fill="#1a1a1a"/>
  <!-- pocket 33 (12-red): -->
  <path d="M256,256 L84.0,91.5 A210,210 0 0,1 108.0,65.5 Z" fill="#c0392b"/>
  <!-- pocket 34 (35-black): -->
  <path d="M256,256 L108.0,65.5 A210,210 0 0,1 135.3,43.5 Z" fill="#1a1a1a"/>
  <!-- pocket 35 (3-red): -->
  <path d="M256,256 L135.3,43.5 A210,210 0 0,1 165.4,26.2 Z" fill="#c0392b"/>
  <!-- pocket 36 (26-black): -->
  <path d="M256,256 L165.4,26.2 A210,210 0 0,1 197.8,14.3 Z" fill="#1a1a1a"/>
  <!-- close back to 0 start -->
  <path d="M256,256 L197.8,14.3 A210,210 0 0,1 256,46 Z" fill="#1a1a1a"/>

  <!-- thin divider lines between pockets -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#8B6914" stroke-width="1.5"/>

  <!-- inner cone / hub area -->
  <circle cx="256" cy="256" r="100" fill="#c9960a"/>
  <circle cx="256" cy="256" r="92"  fill="#8B6914"/>
  <circle cx="256" cy="256" r="82"  fill="#1a1a1a"/>

  <!-- spokes -->
  <line x1="256" y1="174" x2="256" y2="338" stroke="#c9960a" stroke-width="6"/>
  <line x1="174" y1="256" x2="338" y2="256" stroke="#c9960a" stroke-width="6"/>
  <line x1="199" y1="199" x2="313" y2="313" stroke="#c9960a" stroke-width="6"/>
  <line x1="313" y1="199" x2="199" y2="313" stroke="#c9960a" stroke-width="6"/>

  <!-- centre boss -->
  <circle cx="256" cy="256" r="28" fill="#c9960a"/>
  <circle cx="256" cy="256" r="20" fill="#8B6914"/>
  <circle cx="256" cy="256" r="12" fill="#e8b800"/>
</svg>
